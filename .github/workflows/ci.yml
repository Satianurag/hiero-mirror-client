name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Lint & Format
        run: npx biome check .

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npx vitest run tests/unit

      - name: Build
        run: npm run build

      - name: API Surface Check
        if: matrix.node-version == 22
        run: npx api-extractor run --local

      - name: OpenAPI Drift Detection
        if: matrix.node-version == 22
        run: npm run check:drift

      - name: Bundle Size Check (100KB budget)
        if: matrix.node-version == 22
        run: |
          MAX_SIZE=102400
          ESM_SIZE=$(wc -c < dist/index.mjs)
          echo "ESM bundle size: ${ESM_SIZE} bytes"
          if [ "$ESM_SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: ESM bundle size (${ESM_SIZE}B) exceeds budget (${MAX_SIZE}B)"
            exit 1
          fi
          echo "Bundle size within budget."

      - name: Verify CJS Import
        run: node -e "require('./dist/index.cjs')"

      - name: Verify ESM Import
        run: |
          node --input-type=module -e '
            import("./dist/index.mjs")
              .then(() => console.log("✅ ESM import successful"))
              .catch(err => {
                console.error("❌ ESM import failed:", err);
                process.exit(1);
              });
          '

