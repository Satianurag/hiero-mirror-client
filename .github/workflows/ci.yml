name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Lint & Format
        run: npx biome check .

      - name: Type Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npx vitest run tests/unit

      - name: Build
        run: npm run build

      - name: Bundle Size Check
        if: matrix.node-version == 24
        run: npx size-limit

      - name: API Surface Check
        if: matrix.node-version == 22
        run: npx api-extractor run

      - name: Verify CJS Import
        run: node -e "require('./dist/index.cjs')"

      - name: Verify ESM Import
        run: node --input-type=module -e "import('./dist/index.mjs')"

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Integration Tests (Testnet)
        run: npx vitest run tests/integration/ --reporter=verbose
        env:
          MIRROR_NODE_URL: https://testnet.mirrornode.hedera.com
        timeout-minutes: 5
